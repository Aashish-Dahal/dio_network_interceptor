name: dio_network_interceptor
description: A Dio interceptor that globally handles internet connectivity — blocks requests when offline, catches drops mid-transfer, and shows offline UI automatically.
version: 1.0.0
homepage: https://github.com/Aashish-Dahal/dio_network_interceptor
issue_tracker: https://github.com/Aashish-Dahal/dio_network_interceptor/issues

environment:
  sdk: ^3.10.4
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.9.2
  internet_connection_checker_plus: ^2.9.1+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
